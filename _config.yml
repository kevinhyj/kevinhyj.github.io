title: "Yanjie Huang"
description: "A personal garden for AI4Bio research, foundation models, essays, and field notes."
url: "https://kevinhyj.github.io"
baseurl: ""
email: "huangyanjie@sjtu.edu.cn"
github_username: "kevinhyj"
# Paste the value from Google Search Console's HTML-tag verification method here.
# The tag is rendered only after a value is supplied.
google_site_verification: ""

markdown: kramdown
permalink: /blog/:slug/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

paginate: 6
paginate_path: "/blog/page/:num"

collections:
  posts:
    output: true
    permalink: /blog/:slug/
  works:
    output: true
    permalink: /work/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "works"
    values:
      layout: "work"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
