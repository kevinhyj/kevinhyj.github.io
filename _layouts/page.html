---
layout: default
---

{% unless page.hide_title %}
  <section class="page-head">
    <div class="container">
      <p class="eyebrow">{{ page.eyebrow | default: "Pages" }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
        <p>{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </section>
{% endunless %}

{{ content }}
